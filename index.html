<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#032D60;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(1,118,211,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(1,118,211,.07) 1px,transparent 1px);background-size:48px 48px}
body::after{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(1,118,211,.18) 0%,transparent 70%)}
.container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;animation:fadeUp 1.2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo-svg{width:280px}
.divider{width:1px;height:48px;background:linear-gradient(to bottom,rgba(1,118,211,.6),transparent);margin:8px 0}
.badge{display:flex;align-items:center;gap:10px;border:1px solid rgba(1,118,211,.35);background:rgba(1,118,211,.08);backdrop-filter:blur(12px);padding:10px 22px;border-radius:100px}
.badge-dot{width:7px;height:7px;border-radius:50%;background:#1B96FF;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.badge-text{font-size:11px;font-weight:500;letter-spacing:3px;color:#1B96FF;text-transform:uppercase}
.tagline{margin-top:28px;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:rgba(216,237,255,.55);letter-spacing:.5px;text-align:center}
.bottom{position:fixed;bottom:32px;font-size:11px;color:rgba(1,118,211,.45);letter-spacing:2px;text-transform:uppercase}
.contact{margin-top:18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:rgba(216,237,255,.7);letter-spacing:1px;text-decoration:none;border-bottom:1px solid rgba(1,118,211,.4);padding-bottom:3px;transition:all .3s ease}
.contact:hover{color:#1B96FF;border-bottom-color:#1B96FF}
</style>
</head>
<body>
<div class="container">
<svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
<defs>
<linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#1B96FF"/>
<stop offset="100%" style="stop-color:#0176D3"/>
</linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="2.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<g transform="translate(50,8)">
<rect x="10" y="65" width="10" height="50" rx="2" fill="#0176D3" opacity=".9"/>
<rect x="180" y="65" width="10" height="50" rx="2" fill="#0176D3" opacity=".9"/>
<path d="M 15 68 Q 100 5 185 68" fill="none" stroke="url(#arcGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
<rect x="4" y="80" width="192" height="8" rx="3" fill="#0176D3" opacity=".9"/>
<line x1="50" y1="46" x2="50" y2="80" stroke="#1B96FF" stroke-width="3" stroke-linecap="round" opacity=".9"/>
<line x1="100" y1="18" x2="100" y2="80" stroke="#1B96FF" stroke-width="3" stroke-linecap="round" opacity=".9"/>
<line x1="150" y1="46" x2="150" y2="80" stroke="#1B96FF" stroke-width="3" stroke-linecap="round" opacity=".9"/>
<circle cx="50" cy="46" r="5" fill="#1B96FF" filter="url(#glow)"/>
<circle cx="100" cy="18" r="5" fill="#1B96FF" filter="url(#glow)"/>
<circle cx="150" cy="46" r="5" fill="#1B96FF" filter="url(#glow)"/>
</g>
<text x="58" y="168" font-family="'Cormorant Garamond',Georgia,serif" font-size="46" font-weight="700" fill="#1B96FF">MC</text>
<text x="128" y="168" font-family="'Cormorant Garamond',Georgia,serif" font-size="46" font-weight="300" fill="#D8EDFF">Bridge</text>
</svg>
<div class="divider"></div>
<div class="badge"><div class="badge-dot"></div><span class="badge-text">Em construção</span></div>
<p class="tagline">SFMC Orchestration Middleware</p>
<a href="mailto:contato@mcbridge.com.br" class="contact">contato@mcbridge.com.br</a>
</div>
<div class="bottom">mcbridge.com.br &nbsp;·&nbsp; LMCM Marketing &amp; Cloud</div>
</body>
</html>
